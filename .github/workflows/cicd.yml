name: Node.js CI/CD to cPanel

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Install Node.js
        uses: actions/setup-node@v3
        with:
          node-version: "22" # Use your Node.js version

      - name: Install dependencies
        run: npm install

      - name: Build project (if applicable)
        run: npm run build

      - name: Deploy to cPanel via SSH
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.CPANEL_HOST }}
          username: ${{ secrets.CPANEL_USERNAME }}
          key: ${{ secrets.CPANEL_SSH_KEY }}
          passphrase: ${{ secrets.CPANEL_SSH_PASSPHRASE }}
          port: ${{ secrets.CPANEL_PORT }}
          timeout: 120s
          command_timeout: 10m
          debug: true

          source: "." # Source files to deploy
          target: "/home/shevadxp/beabkegnblen.shevadigitals.com" # Target directory on cPanel

      - name: Restart Node.js App (PM2)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.CPANEL_HOST }}
          username: ${{ secrets.CPANEL_USERNAME }}
          key: ${{ secrets.CPANEL_SSH_KEY }}
          passphrase: ${{ secrets.CPANEL_SSH_PASSPHRASE }}
          port: ${{ secrets.CPANEL_PORT }}
          timeout: 120s
          command_timeout: 10m
          debug: true
          script: |
            cd /home/shevadxp/beabkegnblen.shevadigitals.com
            touch tmp/restart.txt
