name: Node.js CI/CD to cPanel

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Create deployment log
        run: |
          echo "=== Deployment Log ===" > deploy-log.txt
          echo "Started: $(date -Iseconds)" >> deploy-log.txt
          echo "Branch: ${{ github.ref_name }}" >> deploy-log.txt
          echo "Commit: ${{ github.sha }}" >> deploy-log.txt
          echo "---" >> deploy-log.txt

      - name: Install Node.js
        uses: actions/setup-node@v3
        with:
          node-version: "20" # Use your Node.js version

      - name: Install dependencies
        run: npm install
      - name: Log progress
        if: success()
        run: echo "Install dependencies: OK" >> deploy-log.txt

      - name: Build project (if applicable)
        run: npm run build
      - name: Log progress
        if: success()
        run: echo "Build: OK" >> deploy-log.txt

      - name: Deploy to cPanel via SSH
        uses: appleboy/scp-action@v0.1.3
        with:
          host: ${{ secrets.CPANEL_HOST }}
          username: ${{ secrets.CPANEL_USERNAME }}
          key: ${{ secrets.CPANEL_SSH_KEY }}
          passphrase: ${{ secrets.CPANEL_SSH_PASSPHRASE }}

          source: "." # Source files to deploy
          target: "/home/lelahukm/abelhana.lelahub.org" # Target directory on cPanel
      - name: Log progress
        if: success()
        run: echo "Deploy SCP: OK" >> deploy-log.txt

      - name: Restart Node.js App (Passenger)
        uses: appleboy/ssh-action@v0.1.3
        with:
          host: ${{ secrets.CPANEL_HOST }}
          username: ${{ secrets.CPANEL_USERNAME }}
          key: ${{ secrets.CPANEL_SSH_KEY }}
          passphrase: ${{ secrets.CPANEL_SSH_PASSPHRASE }}
          script: |
            cd /home/lelahukm/abelhana.lelahub.org
            mkdir -p tmp
            touch tmp/restart.txt
      - name: Log progress
        if: success()
        run: echo "Restart: OK" >> deploy-log.txt

      - name: Health Check
        run: |
          echo "Waiting for application to restart..."
          sleep 15
          
          APP_URL="${{ secrets.APP_URL || 'https://abelhana.lelahub.org' }}"
          HEALTH_ENDPOINT="${APP_URL}/health"
          
          echo "Checking health endpoint: ${HEALTH_ENDPOINT}"
          
          MAX_RETRIES=5
          RETRY_COUNT=0
          HEALTH_STATUS=""
          
          while [ $RETRY_COUNT -lt $MAX_RETRIES ]; do
            echo "Attempt $((RETRY_COUNT + 1)) of $MAX_RETRIES..."
            
            RESPONSE=$(curl -s -w "\n%{http_code}" "${HEALTH_ENDPOINT}" || echo "000")
            HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
            BODY=$(echo "$RESPONSE" | sed '$d')
            
            if [ "$HTTP_CODE" = "200" ]; then
              echo "✓ Health check passed!"
              echo "Response:"
              echo "$BODY"
              HEALTH_STATUS="ok"
              break
            elif [ "$HTTP_CODE" = "503" ]; then
              echo "⚠ Health check returned degraded status (503)"
              echo "Response:"
              echo "$BODY"
              HEALTH_STATUS="degraded"
              break
            else
              echo "✗ Health check failed with HTTP code: $HTTP_CODE"
              RETRY_COUNT=$((RETRY_COUNT + 1))
              if [ $RETRY_COUNT -lt $MAX_RETRIES ]; then
                echo "Retrying in 5 seconds..."
                sleep 5
              fi
            fi
          done
          
          if [ -z "$HEALTH_STATUS" ]; then
            echo "✗ Health check failed after $MAX_RETRIES attempts"
            exit 1
          fi
          
          if [ "$HEALTH_STATUS" = "degraded" ]; then
            echo "⚠ Application is running but in degraded state"
          fi

      - name: Log progress
        if: success()
        run: echo "Health check: OK" >> deploy-log.txt

      - name: Write deploy result and upload log
        if: always()
        run: |
          echo "---" >> deploy-log.txt
          echo "Deploy result: ${{ job.status }}" >> deploy-log.txt
          echo "Finished: $(date -Iseconds)" >> deploy-log.txt

      - name: Fetch server app log (if present)
        if: success()
        uses: appleboy/ssh-action@v0.1.3
        with:
          host: ${{ secrets.CPANEL_HOST }}
          username: ${{ secrets.CPANEL_USERNAME }}
          key: ${{ secrets.CPANEL_SSH_KEY }}
          passphrase: ${{ secrets.CPANEL_SSH_PASSPHRASE }}
          script: |
            cd /home/lelahukm/abelhana.lelahub.org
            if [ -f logs/app.log ]; then
              tail -n 200 logs/app.log
            else
              echo "(No logs/app.log yet)"
            fi
          script_stop: true

      - name: Upload deployment log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: deployment-log-${{ github.run_number }}
          path: deploy-log.txt
          retention-days: 30

